# Railway deployment config
# Railway will deploy TWO services from this repo:
#   1. backend (FastAPI web service)
#   2. scraper (cron job, runs every 2h)
#
# After connecting the repo:
#   - Add a PostgreSQL plugin (Railway provides DATABASE_URL automatically)
#   - Set ANTHROPIC_API_KEY in the Variables tab
#   - Set ALLOWED_ORIGINS to your GitHub Pages URL
#   - Set ADMIN_PASSWORD to something strong

[build]
builder = "NIXPACKS"

[deploy]
healthcheckPath = "/health"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
